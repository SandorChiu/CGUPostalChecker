<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>長庚大學自動查詢郵件</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <h3>長庚大學自動查詢郵件</h3>

  <div class="status-line"><strong>狀態</strong><span id="enabledBadge" class="badge">讀取中</span></div>
  <div class="status-line"><strong>收件人</strong><span id="recipientCount">-</span></div>
  <div class="status-line"><strong>上次查詢</strong><span id="lastCheckTime">-</span></div>
  <div class="status-line"><strong>下次自動允許</strong><span id="nextAllowedCheckAt">-</span></div>
  <div class="status-line"><strong>結果</strong><span id="lastResultText">-</span></div>

  <hr>

  <div class="button-row">
    <button id="checkNow">立即查詢一次</button>
    <button id="start" class="success">開始監控</button>
    <button id="stop" class="danger">停止監控</button>
    <button id="openPostal" class="secondary">開啟查詢頁</button>
    <button id="options" class="secondary">設定</button>
    <button id="history" class="secondary">紀錄</button>
    <button id="tutorial" class="secondary">使用教學</button>
  </div>

  <p id="message" class="small"></p>

  <script src="popup.js"></script>
</body>
</html>
